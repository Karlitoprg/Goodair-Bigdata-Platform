global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# AJOUT CRITIQUE 2 : Où envoyer les alertes
alerting:
  alertmanagers:
  - static_configs:
    - targets: ['alertmanager:9093'] # Nom du service dans docker-compose

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: airflow_statsd
    static_configs:
      - targets: ["statsd-exporter:9102"]

